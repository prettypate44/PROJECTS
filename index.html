<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📝 Task Manager</h1>

        <!-- FORM -->
        <form id="taskForm">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter task">
             
            <input
                type="text"
                id="taskInput"
                placeholder="Delete task">
            
            <input
                type="text"
                id="taskInput"
                placeholder="Edit task">


            <button type="submit">
                Add Task
            </button>

        </form>

        <!-- TASK LIST -->
        <ul id="taskList"></ul>

    </div>

    <script src="front.js"></script>

</body>

</html>
